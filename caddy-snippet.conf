# Adicionar dentro do bloco "atende.salatielbatista.com.br" do Caddyfile,
# antes do handle default (que faz proxy pro Chatwoot).
#
# Serve o overlay.js a partir do diretório clonado do repo.

@dmoverlay path /dm-overlay/*

handle @dmoverlay {
    uri strip_prefix /dm-overlay
    root * /opt/chatwoot-overlay-digitalmaster
    header Cache-Control "public, max-age=300"
    header Access-Control-Allow-Origin "*"
    file_server
}
